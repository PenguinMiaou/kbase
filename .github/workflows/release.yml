name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install .
          pip install jieba pyinstaller pyobjc-framework-Cocoa

      - name: Extract version
        id: version
        run: echo "VERSION=$(python -c "exec(open('kbase/__init__.py').read()); print(__version__)")" >> $GITHUB_OUTPUT

      - name: Create icon
        run: |
          mkdir -p build/KBase.iconset
          python3 -c "
          from PIL import Image, ImageDraw, ImageFont
          import os
          sizes = [16, 32, 64, 128, 256, 512]
          iconset = 'build/KBase.iconset'
          for s in sizes:
              for scale, suffix in [(1, ''), (2, '@2x')]:
                  sz = s * scale
                  img = Image.new('RGBA', (sz, sz), (0, 0, 0, 0))
                  draw = ImageDraw.Draw(img)
                  cx, cy, r = sz/2, sz/2, sz*0.45
                  for i in range(sz):
                      for j in range(sz):
                          dist = ((i-cx)**2 + (j-cy)**2)**0.5
                          if dist < r:
                              blue = int(120 + 80 * (1 - dist/r))
                              img.putpixel((i, j), (30, 60, min(blue, 220), 255))
                  try:
                      font = ImageFont.truetype('/System/Library/Fonts/Helvetica.ttc', int(sz*0.5))
                  except:
                      font = ImageFont.load_default()
                  draw.text((sz*0.28, sz*0.18), 'K', fill=(255, 255, 255, 255), font=font)
                  img.save(f'{iconset}/icon_{s}x{s}{suffix}.png', 'PNG')
          " 2>/dev/null || echo "Icon generation skipped"
          iconutil -c icns build/KBase.iconset -o build/KBase.icns 2>/dev/null || echo "iconutil skipped"

      - name: Build with PyInstaller
        run: |
          pyinstaller kbase.spec --noconfirm

      - name: Create DMG
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          STAGING=dist/dmg-staging
          mkdir -p "$STAGING"
          cp -R dist/KBase.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "KBase-${VERSION}" -srcfolder "$STAGING" -ov -format UDBZ "dist/KBase-${VERSION}.dmg"
          rm -rf "$STAGING"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: KBase-macOS
          path: dist/KBase-${{ steps.version.outputs.VERSION }}.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install .
          pip install jieba pyinstaller pystray Pillow

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=$(python -c "exec(open('kbase/__init__.py').read()); print(__version__)")" >> $GITHUB_OUTPUT

      - name: Create icon
        shell: python
        run: |
          try:
              from PIL import Image, ImageDraw
              img = Image.new('RGBA', (256, 256), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              cx, cy, r = 128, 128, 115
              for i in range(256):
                  for j in range(256):
                      dist = ((i-cx)**2 + (j-cy)**2)**0.5
                      if dist < r:
                          blue = int(120 + 80 * (1 - dist/r))
                          img.putpixel((i, j), (30, 60, min(blue, 220), 255))
              draw.text((80, 50), "K", fill=(255, 255, 255))
              import os
              os.makedirs("build", exist_ok=True)
              img.save("build/KBase.ico", format="ICO",
                       sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
              print("Icon created")
          except Exception as e:
              print(f"Icon skipped: {e}")

      - name: Build with PyInstaller
        run: pyinstaller kbase_win.spec --noconfirm

      - name: Create ZIP
        shell: powershell
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          Compress-Archive -Path "dist\KBase\*" -DestinationPath "dist\KBase-${version}-Windows.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: KBase-Windows
          path: dist/KBase-${{ steps.version.outputs.VERSION }}-Windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=$(python3 -c "exec(open('kbase/__init__.py').read()); print(__version__)")" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: KBase v${{ steps.version.outputs.VERSION }}
          body: |
            ## KBase v${{ steps.version.outputs.VERSION }}

            ### Downloads
            - **macOS**: `KBase-${{ steps.version.outputs.VERSION }}.dmg` — Double-click to install, drag to Applications
            - **Windows**: `KBase-${{ steps.version.outputs.VERSION }}-Windows.zip` — Extract and run `KBase.exe`
            - **Source**: Clone and run `bash install.sh` (macOS/Linux) or `install.bat` (Windows)

            ### Quick Start
            1. Download for your platform
            2. Run KBase — browser opens automatically at http://127.0.0.1:8765
            3. Go to Settings to configure your LLM API key
            4. Use Ingest tab to add your documents
          files: |
            artifacts/KBase-macOS/*
            artifacts/KBase-Windows/*
          draft: false
          prerelease: false
