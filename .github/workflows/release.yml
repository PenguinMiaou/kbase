name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Tauri Lite (online installer, ~5MB) ─────────────────────────
  build-tauri-lite:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            suffix: aarch64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            suffix: x64
          - platform: windows-latest
            args: ""
            suffix: x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install npm deps
        working-directory: kbase-desktop
        run: npm install

      - name: Build Tauri (lite)
        working-directory: kbase-desktop
        run: npx tauri build ${{ matrix.args }}

      - name: Upload macOS lite
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: KBase-lite-macOS-${{ matrix.suffix }}
          path: kbase-desktop/src-tauri/target/*/release/bundle/dmg/*.dmg

      - name: Upload Windows lite
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: KBase-lite-Windows
          path: |
            kbase-desktop/src-tauri/target/release/bundle/nsis/*.exe
            kbase-desktop/src-tauri/target/release/bundle/msi/*.msi

  # ── Tauri Fat (offline, bundled Python + model, ~500MB) ─────────
  build-tauri-fat:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            suffix: aarch64
          - platform: windows-latest
            suffix: x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install npm deps
        working-directory: kbase-desktop
        run: npm install

      - name: Build fat (macOS)
        if: matrix.platform == 'macos-latest'
        working-directory: kbase-desktop
        run: bash build-fat.sh

      - name: Build fat (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: kbase-desktop
        run: build-fat.bat

      - name: Upload macOS fat
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: KBase-full-macOS-${{ matrix.suffix }}
          path: kbase-desktop/src-tauri/target/release/bundle/dmg/*_full.dmg

      - name: Upload Windows fat
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: KBase-full-Windows
          path: kbase-desktop/src-tauri/target/release/

  # ── PyPI wheel ──────────────────────────────────────────────────
  build-pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build && python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: KBase-PyPI
          path: dist/*

  # ── Release ─────────────────────────────────────────────────────
  release:
    needs: [build-tauri-lite, build-tauri-fat, build-pypi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=$(python3 -c "exec(open('kbase/__init__.py').read()); print(__version__)")" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: KBase v${{ steps.version.outputs.VERSION }}
          body: |
            ## KBase v${{ steps.version.outputs.VERSION }}

            ### Download

            | Platform | Online (~5MB) | Offline (~500MB) |
            |----------|--------------|-----------------|
            | macOS (Apple Silicon) | `KBase_*_aarch64.dmg` | `KBase_*_aarch64_full.dmg` |
            | macOS (Intel) | `KBase_*_x64.dmg` | — |
            | Windows | `KBase_*_x64-setup.exe` | Coming soon |

            **Online version** downloads Python + dependencies on first launch (~2 min).
            **Offline version** includes everything — no internet needed.

            ### Alternative Install
            ```bash
            # One command (macOS/Linux)
            curl -LsSf https://astral.sh/uv/install.sh | sh && uv tool install kbase-app

            # pip
            pip install kbase-app
            ```

            ### What's New
            - Native desktop app (Tauri WebView) — no more browser tab
            - Online + Offline installer options
            - `uv`-based installer — fast, reliable, isolated Python
            - Published on PyPI: `pip install kbase-app`
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/KBase-PyPI/*
          draft: false
          prerelease: false
